<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaBridge AI · 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F1EFE8;
    --border: #D3D1C7; --border2: #B4B2A9;
    --text: #1A1A18; --text2: #5F5E5A; --text3: #888780;
    --accent-bg: #1A1A18; --accent-text: #FFFFFF;
    --blue: #185FA5; --blue-bg: #E6F1FB;
    --red: #993C1D; --red-bg: #FAECE7;
    --green: #3B6D11; --green-bg: #EAF3DE;
    --radius: 10px; --radius-sm: 6px;
  }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }
  .logo-wrap { text-align: center; margin-bottom: 2.5rem; }
  .logo { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; letter-spacing: 0.04em; }
  .logo-sub { font-size: 13px; color: var(--text3); margin-top: 8px; line-height: 1.6; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    width: 100%; max-width: 380px;
    text-align: center;
  }
  .card-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--text3); margin-bottom: 2rem; line-height: 1.6; }

  .google-btn {
    width: 100%; padding: 13px 16px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 500;
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s;
    text-decoration: none;
  }
  .google-btn:hover { background: var(--surface2); border-color: var(--text); }
  .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 1.5rem 0; color: var(--text3); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .status-msg {
    font-size: 13px; padding: 10px 12px;
    border-radius: var(--radius-sm); border: 1px solid;
    margin-top: 14px; display: none; line-height: 1.5; text-align: left;
  }
  .status-msg.error { background: var(--red-bg); border-color: #F5C4B3; color: var(--red); }
  .status-msg.info  { background: var(--blue-bg); border-color: #B5D4F4; color: var(--blue); }
  .status-msg.success { background: var(--green-bg); border-color: #C0DD97; color: var(--green); }

  .notice {
    font-size: 12px; color: var(--text3); line-height: 1.7;
    margin-top: 1.5rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .footer-text {
    text-align: center; font-size: 12px; color: var(--text3); margin-top: 1.5rem;
  }
</style>
</head>
<body>

<div class="logo-wrap">
  <p class="logo">MetaBridge AI</p>
  <p class="logo-sub">AI 상품 정보 변환 솔루션</p>
</div>

<div class="card">
  <p class="card-title">시작하기</p>
  <p class="card-sub">구글 계정으로 간편하게 로그인하세요.<br>계정이 없어도 구글 로그인으로 자동 가입됩니다.</p>

  <button class="google-btn" onclick="googleLogin()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Google로 계속하기
  </button>

  <div class="status-msg" id="statusMsg"></div>

  <div class="notice">
    로그인 시 서비스 이용약관 및 개인정보처리방침에 동의하는 것으로 간주됩니다.
  </div>
</div>

<p class="footer-text">© 2026 MetaBridge AI · All rights reserved</p>

<script>
const API_BASE = '/api';

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = `status-msg ${type}`;
  el.style.display = 'block';
}

async function googleLogin() {
  showStatus('구글 로그인 페이지로 이동 중...', 'info');
  // 서버의 Google OAuth 엔드포인트로 이동
  window.location.href = `${API_BASE}/auth/google`;
}

// URL 파라미터로 토큰 받기 (OAuth 콜백 후)
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const error = params.get('error');

if (token) {
  localStorage.setItem('token', token);
  // 유저 정보 가져오기
  fetch(`${API_BASE}/auth/me`, {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(r => r.json())
  .then(user => {
    localStorage.setItem('user', JSON.stringify(user));
    showStatus('✓ 로그인 성공! 이동 중...', 'success');
    setTimeout(() => {
      window.location.href = user.role === 'admin' ? 'admin.html' : 'converter.html';
    }, 800);
  })
  .catch(() => { window.location.href = 'converter.html'; });
} else if (error) {
  showStatus('로그인 실패: ' + decodeURIComponent(error), 'error');
} else {
  // 이미 로그인된 경우
  const savedToken = localStorage.getItem('token');
  if (savedToken) window.location.href = 'converter.html';
}
</script>
</body>
</html>
